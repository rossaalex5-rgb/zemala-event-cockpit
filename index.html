<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zemala Event Cockpit v1.0</title>
    <style>
        :root {
            --bg: #050505;
            --panel: #0f0f0f;
            --gold: #ffd700;
            --text: #e0e0e0;
            --muted: #666666;
            --glow: rgba(255, 215, 0, 0.15);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Courier New', monospace; padding: 20px;
            max-width: 800px; margin: 0 auto; line-height: 1.6;
        }
        header {
            text-align: center; margin-bottom: 30px;
            border-bottom: 1px solid var(--gold); padding-bottom: 20px;
        }
        h1 {
            color: var(--gold); margin: 0; font-size: 1.5rem;
            letter-spacing: 3px; text-shadow: 0 0 15px var(--glow);
        }
        .input-area {
            background: var(--panel); padding: 25px; border-radius: 16px;
            border: 1px solid rgba(255, 215, 0, 0.08);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 30px;
        }
        select, input {
            width: 100%; padding: 15px; margin: 10px 0;
            background: #000; border: 1px solid rgba(255,215,0,0.2);
            color: var(--gold); border-radius: 8px; font-size: 1rem;
            outline: none; transition: border 0.3s;
        }
        select:focus, input:focus { border: 1px solid var(--gold); }
        button {
            padding: 15px; margin: 10px 0; background: var(--gold);
            color: #000; border: none; border-radius: 8px;
            font-weight: 900; cursor: pointer; transition: all 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        button:hover { background: #fff; transform: translateY(-2px); box-shadow: 0 5px 15px var(--glow); }
        button.ghost {
            background: transparent; color: var(--gold);
            border: 1px solid var(--gold);
        }
        #status {
            padding: 12px; border-radius: 8px; margin-bottom: 20px;
            text-align: center; font-size: 0.85rem; letter-spacing: 1px;
            background: rgba(255,215,0,0.05); border: 1px solid rgba(255,215,0,0.1);
        }
        #ledger {
            display: flex; flex-direction: column; gap: 16px;
            max-height: 50vh; overflow-y: auto; padding-right: 10px;
        }
        .bubble {
            background: linear-gradient(145deg, #111, #080808);
            padding: 20px; border-radius: 12px;
            border-left: 4px solid var(--gold);
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            animation: fadeIn 0.4s ease-out;
        }
        .meta { color: var(--muted); font-size: 0.8rem; margin-top: 8px; display: flex; justify-content: space-between; }
        .hash { color: var(--gold); font-size: 0.75rem; margin-top: 10px; opacity: 0.6; word-break: break-all; }
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--gold); color: #000; padding: 12px 25px;
            border-radius: 50px; font-weight: bold; opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 2000;
        }
        .toast.show { opacity: 1; bottom: 50px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
    </style>
</head>
<body>
    <header>
        <h1>ZEMALA COCKPIT</h1>
        <div style="color: var(--gold); font-size: 0.7rem; letter-spacing: 5px; margin-top: 5px;">STUFE 100 HYGIENE</div>
    </header>

    <div class="input-area">
        <select id="cmd">
            <option value="vibrate">✨ Vibrate (Hardware Test)</option>
            <option value="echo">📡 Echo (Message)</option>
            <option value="task">⚙️ Task (FleetOS)</option>
            <option value="update_metadata">💎 Update Metadata</option>
        </select>
        <input type="text" id="payload" placeholder="Intention eingeben..." autocomplete="off">
        
        <div style="display:flex; gap:12px;">
            <button onclick="signAndDownload()" style="flex:2">VERSIEGELN</button>
            <button onclick="exportAll()" class="ghost" style="flex:1">EXPORT</button>
        </div>
    </div>

    <div id="status">INITIALISIERUNG...</div>
    <div id="ledger"></div>

    <div class="toast" id="toast">VOLLZUG BESTÄTIGT</div>

    <script src="app.js"></script>
</body>
</html>
